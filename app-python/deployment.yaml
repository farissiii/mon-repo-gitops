apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app-deployment
spec:
  replicas: 1 # On commence avec 1
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app
        image: khaliiiiid/mon-app-python:1.0.28
        ports:
        - containerPort: 5000 
        resources: # <--- AJOUTE ÇA
          requests:
            cpu: "100m" # On demande un peu de CPU
            memory: "128Mi"
          limits:
            cpu: "200m" # On limite pour ne pas faire crasher le worker
            memory: "256Mi"
