apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app-deployment
spec:
  replicas: 1 # On commence avec 1
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app
        image: khaliiiiid/mon-app-python:1.0.28
        ports:
        - containerPort: 5000
        # AJOUTE ÇA : C'est le moteur de l'auto-scaling
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "200m"
