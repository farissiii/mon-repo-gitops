apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-logging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: loki-stack
    targetRevision: 2.10.2
    helm:
      values: |
        loki:
          persistence:
            enabled: false # On ne crée pas de volume persistant pour ce lab (gain de temps)
        promtail:
          enabled: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
