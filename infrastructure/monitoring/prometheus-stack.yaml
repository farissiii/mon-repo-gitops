apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/farisiiii/mon-repo-gitops.git' # TON REPO
    targetRevision: main
    path: infrastructure/monitoring
    helm:
      # On pointe vers le chart officiel mais on utilise TON fichier pour les réglages
      valueFiles:
        - prometheus-stack.yaml 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
