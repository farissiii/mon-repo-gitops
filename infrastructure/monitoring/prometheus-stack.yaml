apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: 56.6.2
    helm:
      values: |
        grafana:
          adminPassword: "admin"
          service:
            type: NodePort
            nodePort: 30552
        
        prometheus:
          # --- CETTE PARTIE EST POUR L'OPERATOR ---
          prometheusSpec:
            retention: 1d
            resources:
              requests:
                memory: "400Mi"
              limits:
                memory: "900Mi"
            additionalScrapeConfigs:
              - job_name: 'docker-jenkins'
                static_configs:
                  - targets: ['192.168.1.104:9323']
              - job_name: 'mon-pc-local'
                static_configs:
                  - targets: ['192.168.1.15:9182']

          # --- CETTE PARTIE EST POUR LES REGLES (CORRIGÉ ICI) ---
          additionalPrometheusRulesMap:
            custom-rules:
              groups:
                - name: MyDevOpsAlerts
                  rules:
                    - alert: FlaskAppDown
                      expr: up{pod=~"flask-app.*"} == 0
                      for: 1m
                      labels:
                        severity: critical
                      annotations:
                        summary: "ALERTE: L'application Python est tombée !"

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
