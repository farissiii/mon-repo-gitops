apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: 45.x.x # Utilise une version récente
    helm:
      values: |
        grafana:
          adminPassword: "admin" # Change-le après
          service:
            type: NodePort # Pour y accéder facilement depuis ton navigateur
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # ArgoCD créera le namespace 'monitoring' tout seul
